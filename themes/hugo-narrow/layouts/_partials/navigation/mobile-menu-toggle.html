<!-- 移动端菜单按钮（仅按钮，面板由 mobile-nav-panel.html 提供） -->
<button
  id="mobile-nav-toggle"
  class="nav-panel-toggle border-border bg-background text-muted-foreground hover:bg-accent hover:text-foreground flex h-10 w-10 items-center justify-center rounded-lg border transition-colors duration-200"
  aria-label="{{ T `nav.menu` }}"
  aria-expanded="false"
  aria-controls="mobile-nav-panel"
>
  {{ partial "features/icon.html" (dict "name" "menu" "size" "md" "ariaLabel" (T "nav.menu")) }}
</button>
